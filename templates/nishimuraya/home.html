{% extends "base.html" %}

{% block content %}
<section class="mx-auto flex min-h-screen max-w-5xl items-center px-6 py-16">
    <div class="w-full">
        <p class="text-sm font-semibold uppercase tracking-wide text-cyan-400">Nishimuraya</p>
        <h1 class="mt-4 max-w-3xl text-4xl font-semibold text-white sm:text-5xl">準備完了</h1>
        <p class="mt-6 max-w-2xl text-base leading-7 text-slate-300 sm:text-lg">
            最初のページを起点に、機能と画面を追加できます。
        </p>
        <div class="mt-10 grid gap-4 sm:grid-cols-3">
            <div class="rounded-lg border border-slate-800 bg-slate-900/70 p-5">
                <p class="text-sm text-slate-400">Backend</p>
                <p class="mt-2 text-xl font-semibold text-white">Django</p>
            </div>
            <div class="rounded-lg border border-slate-800 bg-slate-900/70 p-5">
                <p class="text-sm text-slate-400">Database</p>
                <p class="mt-2 text-xl font-semibold text-white">PostgreSQL</p>
            </div>
            <div class="rounded-lg border border-slate-800 bg-slate-900/70 p-5">
                <p class="text-sm text-slate-400">Style</p>
                <p class="mt-2 text-xl font-semibold text-white">Tailwind CSS</p>
            </div>
        </div>
    </div>
</section>
{% endblock %}
