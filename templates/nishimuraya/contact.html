{% load static %}
<!DOCTYPE html>
<html lang="ja">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>お問い合わせ | Nishimuraya</title>
	<link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body class="contact-page">

	{% include "nishimuraya/includes/site_header.html" %}

	<main class="contact-main" id="top">
		<section class="contact-hero">
			<p class="home-kicker">CONTACT</p>
			<h1>お問い合わせフォーム</h1>
			<p>
				ご予約に関するご相談、貸切利用、アレルギー対応などはこちらからお問い合わせください。
			</p>
		</section>

		<section class="contact-form-wrap" aria-labelledby="contact-form-title">
			<h2 id="contact-form-title">お問い合わせ内容</h2>

			<form class="contact-form" action="https://formsubmit.co/5oushiza6@gmail.com" method="post">
				<input type="hidden" name="_subject" value="Nishimurayaサイトからお問い合わせ">
				<input type="hidden" name="_template" value="table">
				<input type="hidden" name="_captcha" value="false">
				<input type="hidden" name="_next" id="contact-next" value="">
				<input type="text" name="_honey" tabindex="-1" autocomplete="off"
					style="position:absolute;left:-9999px;opacity:0;pointer-events:none;">

				<label for="contact-name">お名前</label>
				<input id="contact-name" name="name" type="text" required>

				<label for="contact-email">メールアドレス</label>
				<input id="contact-email" name="email" type="email" required>

				<label for="contact-phone">電話番号（任意）</label>
				<input id="contact-phone" name="phone" type="tel">

				<label for="contact-message">お問い合わせ内容</label>
				<textarea id="contact-message" name="message" rows="7" required></textarea>

				<button type="submit">送信する</button>
			</form>

		</section>
	</main>

	{% include "nishimuraya/includes/site_footer.html" %}

	<script>
		(() => {
			const nextInput = document.getElementById('contact-next');
			if (!nextInput) return;
			nextInput.value = new URL('contact-thanks.html', window.location.href).href;
		})();
	</script>
	<script src="{% static 'js/script.js' %}"></script>
</body>

</html>
